name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: emergent_test
          POSTGRES_USER: emergent
          POSTGRES_PASSWORD: emergent
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci -w backend

      - name: Install frontend dependencies
        run: npm ci -w frontend

      - name: Lint with ESLint
        run: npm run lint

      - name: Type check TypeScript
        run: npm run type-check -w frontend

      - name: Run backend tests
        run: npm run test -w backend
        env:
          DATABASE_URL: postgresql://emergent:emergent@localhost:5432/emergent_test

      - name: Run frontend tests
        run: npm run test -w frontend

      - name: Build backend
        run: npm run build -w backend

      - name: Build frontend
        run: npm run build -w frontend

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
